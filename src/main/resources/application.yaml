server:
  port: 8080

spring:
  application:
    name: weather-api
  datasource:
    url: jdbc:h2:mem:weatherdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always
  cache:
    type: caffeine
  h2:
    console:
      enabled: true
      path: /h2-console

weather:
  api:
    base-url: ${WEATHER_API_BASE_URL:http://api.weatherapi.com/v1}
    key: ${WEATHER_API_KEY:your-api-key-here}
    timeout-ms: ${WEATHER_API_TIMEOUT_MS:5000}

resilience4j:
  circuitbreaker:
    instances:
      weatherApi:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
  ratelimiter:
    instances:
      weatherApi:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 5s
