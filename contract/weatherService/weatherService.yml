      description: >-
        Returns location and time zone information in JSON format. This endpoint
        provides the current local time, UTC offset, and time zone details for
        any location specified by query parameter (city name, coordinates, IP
        address, or US/Canada/UK zip code).


        **Response includes:**


        - Location details (name, region, country, coordinates)
        
        - Current local time and date
        
        - Time zone name and identifier
        
        - UTC offset in hours
        
        - Whether daylight saving time is currently active
        
        
        **Use cases:**


        - Display local time for any global location
        
        - Convert between time zones
        
        - Validate location-based time zone data
