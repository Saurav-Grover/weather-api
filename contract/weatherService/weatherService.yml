      tags:
        - future.json
      description: >-
        ## Future Weather Data


        Retrieves weather forecast information for dates beyond the standard
        14-day forecast period. Access extended weather predictions for future
        dates.


        ### Required Parameters

        - **q** (query): Location identifier - can be:
          - City name (e.g., "Sydney")
          - Latitude/longitude (e.g., "-33.8688,151.2093")
          - US zip code (e.g., "10001")
          - UK postcode (e.g., "SW1")
          - IP address (e.g., "100.0.0.1")
          - IATA airport code (e.g., "SYD")
        - **key** (query): Your WeatherAPI.com API key for authentication

        - **dt** (query): Future date for forecast (format: yyyy-MM-dd)


        ### Optional Parameters

        - **unixdt**: Unix timestamp for the future date (alternative to dt)

        - **aqi**: Include air quality predictions (yes/no, default: no)

        - **pollen**: Include pollen forecast (yes/no, default: no)

        - **current_fields**: Comma-separated list of specific current fields to
        return

        - **day_fields**: Comma-separated list of specific daily fields to
        return

        - **hour_fields**: Comma-separated list of specific hourly fields to
        return

        - **lang**: Response language code (e.g., "en", "es", "fr")


        ### Common Use Cases

        - Long-term event planning (weddings, conferences, outdoor events)

        - Extended travel planning

        - Agricultural seasonal planning

        - Construction project scheduling

        - Long-range weather trend analysis


        ### Response Highlights

        Returns extended forecast data including predicted temperature,
        precipitation probability, wind conditions, and general weather patterns
        for future dates beyond the standard forecast window.
