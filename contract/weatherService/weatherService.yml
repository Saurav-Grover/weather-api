                      type: string
                    key_1:
                      type: string
                    key_2:
                      type: string
              example:
                - key_0: string
                  key_1: string
                  key_2: string
                - key_0: string
      tags:
        - search.json
      description: >-
        ## Location Search / Autocomplete


        Searches for locations and provides autocomplete suggestions based on
        partial input. Useful for implementing location search functionality in
        applications.


        ### Required Parameters

        - **q** (query): Search query - partial or complete location name
        (minimum 3 characters recommended)

        - **key** (query): Your WeatherAPI.com API key for authentication


        ### Optional Parameters

        None for this endpoint


        ### Common Use Cases

        - Autocomplete dropdowns for location selection

        - Location search functionality in weather apps

        - Validating user-entered locations

        - Finding location coordinates for other API calls

        - Building location pickers with type-ahead suggestions


        ### Response Highlights

        Returns an array of matching locations with:

        - Location name and region

        - Country

        - Latitude and longitude coordinates

        - Location ID

        - URL-friendly location identifier


        Each result can be used as the 'q' parameter in other weather API
        endpoints.
