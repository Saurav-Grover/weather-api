      tags:
        - history.json
      description: >-
        ## Historical Weather Data


        Retrieves past weather information for a specified location and date
        range. Access historical weather data going back several years.


        ### Required Parameters

        - **q** (query): Location identifier - can be:
          - City name (e.g., "Tokyo")
          - Latitude/longitude (e.g., "35.6762,139.6503")
          - US zip code (e.g., "90210")
          - UK postcode (e.g., "SW1")
          - IP address (e.g., "100.0.0.1")
          - IATA airport code (e.g., "LAX")
        - **key** (query): Your WeatherAPI.com API key for authentication

        - **dt** (query): Date for historical data (format: yyyy-MM-dd, e.g.,
        "2023-06-15")


        ### Optional Parameters

        - **unixdt**: Unix timestamp for the date (alternative to dt)

        - **end_dt**: End date for date range queries (format: yyyy-MM-dd)

        - **unixend_dt**: Unix timestamp for end date

        - **hour**: Specific hour for hourly data (0-23)

        - **aqi**: Include air quality data (yes/no, default: no)

        - **pollen**: Include pollen data (yes/no, default: no)

        - **tp**: Time interval for data points (15, 30, 60 minutes)

        - **lang**: Response language code (e.g., "en", "es", "fr")

        - **solar**: Include solar radiation data (yes/no, default: no)

        - **et0**: Include evapotranspiration data (yes/no, default: no)


        ### Common Use Cases

        - Weather analysis and research

        - Historical weather comparisons

        - Climate trend analysis

        - Verifying past weather conditions for insurance/legal purposes

        - Agricultural planning based on historical patterns


        ### Response Highlights

        Returns historical weather data including temperature, precipitation,
        wind speed, humidity, pressure, and optional air quality/solar data for
        the specified date(s).
