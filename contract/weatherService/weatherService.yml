      tags:
        - current.json
      description: >-
        ## Bulk Current Weather Data


        Retrieves real-time weather information for multiple locations in a
        single API call. This endpoint is optimized for fetching current weather
        data for multiple locations simultaneously.


        ### Required Parameters

        - **q** (query): Must be set to "bulk" to enable bulk request mode

        - **key** (query): Your WeatherAPI.com API key for authentication


        ### Request Body (JSON)

        The request body must contain a `locations` array with location objects:

        ```json

        {
          "locations": [
            {
              "q": "London",
              "custom_id": "location1"
            },
            {
              "q": "48.8567,2.3508",
              "custom_id": "location2"
            }
          ]
        }

        ```


        Each location object contains:

        - **q**: Location identifier (city name, coordinates, zip code, IP
        address, etc.)

        - **custom_id**: Optional custom identifier to match responses with
        requests


        ### Optional Parameters

        - **aqi**: Include air quality data (yes/no, default: no)

        - **pollen**: Include pollen data (yes/no, default: no)

        - **lang**: Response language code (e.g., "en", "es", "fr")


        ### Common Use Cases

        - Fetching weather for multiple store/office locations

        - Dashboard displays with multiple city weather

        - Comparing weather across different regions

        - Reducing API calls by batching location requests


        ### Response Highlights

        Returns an object with weather data for each location, keyed by the
        custom_id or indexed sequentially. Each location includes current
        temperature, conditions, wind, humidity, and optional air quality data.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                locations:
                  type: array
                  items:
                    type: object
                    properties:
                      q:
                        type: string
                      custom_id:
                        type: string
            example:
              locations:
                - q: string
                  custom_id: string
                - q: string
                  custom_id: string
