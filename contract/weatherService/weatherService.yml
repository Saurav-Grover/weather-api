openapi: 3.0.0
info:
  title: WeatherAPI.com APIs
  version: 1.0.0
  description: >-
    # WeatherAPI.com API Collection


    This collection provides access to the WeatherAPI.com API endpoints for
    weather data, forecasts, and related services.


    ## 🔧 Setup


    ### Environments


    This collection works with two environments:


    - **WeatherAPI - Development**: For testing and development
    
    - **WeatherAPI - Production**: For production use
    
    
    ### Required Variables


    Each environment includes:


    - `api_key` (secret): Your WeatherAPI.com API key - Get yours at
    [https://www.weatherapi.com/my/](https://www.weatherapi.com/my/)
    
    - `base_url`: Base URL for API endpoints
    ([https://api.weatherapi.com/v1](https://api.weatherapi.com/v1))
    
    - `location`: Default location for testing (e.g., "London", coordinates, zip
    code)
    
    
    ### Getting Started


    1. Select an environment (Development or Production)
    
    2. Add your API key to the `api_key` variable in the selected environment
    
    3. Update the `location` variable if needed
    
    4. Start making requests!
    
    
    ## 📝 Authentication


    All requests require an API key passed as a query parameter:
    `key={{api_key}}`
servers:
  - url: https://api.weatherapi.com/v1
paths:
  /current.json:
    get:
      summary: Current weather (JSON)
      parameters:
        - name: q
          in: query
          schema:
            type: string
          example: '{{location}}'
        - name: aqi
          in: query
          schema:
            type: string
          example: 'no'
        - name: pollen
          in: query
          schema:
            type: string
          example: 'no'
        - name: lang
          in: query
          schema:
            type: string
          example: string
        - name: current_fields
          in: query
          schema:
            type: string
          example: string
      responses:
        '200':
          description: Current weather response
          content:
            application/json:
              schema:
                type: object
                properties:
                  key_0:
                    type: integer
                  key_1:
                    type: integer
                  key_2:
                    type: number
              example:
                key_0: 9623
                key_1: 2164
                key_2: 3205.4823401553235
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
              example:
                error:
                  code: 7112
                  message: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
              example:
                error:
                  code: 7112
                  message: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
              example:
                error:
                  code: 7112
                  message: string
      tags:
        - current.json
      description: >-
        ## Current Weather Data


        Retrieves real-time weather information for a specified location.


        ### Required Parameters

        - **q** (query): Location identifier - can be:
          - City name (e.g., "London")
          - Latitude/longitude (e.g., "48.8567,2.3508")
          - US zip code (e.g., "10001")
          - UK postcode (e.g., "SW1")
          - IP address (e.g., "100.0.0.1")
          - IATA airport code (e.g., "JFK")
        - **key** (query): Your WeatherAPI.com API key for authentication


        ### Optional Parameters

        - **aqi**: Include air quality data (yes/no, default: no)

        - **pollen**: Include pollen data (yes/no, default: no)

        - **lang**: Response language code (e.g., "en", "es", "fr")

        - **current_fields**: Comma-separated list of specific fields to return


        ### Common Use Cases

        - Display current weather on websites/apps

        - Weather widgets and dashboards

        - Location-based weather notifications

        - Real-time weather monitoring


        ### Response Highlights

        Returns current temperature, conditions, wind speed, humidity, pressure,
        visibility, UV index, and optional air quality/pollen data.
