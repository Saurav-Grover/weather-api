openapi: 3.0.3
info:
  title: Weather Data Service API
  description: "A back-end weather data service that provides current weather, forecasts, location search, and favourite locations management."
  version: 1.0.0

tags:
  - name: WeatherService
  - name: ForecastService
  - name: LocationService
  - name: FavouriteService
  - name: HealthService

paths:
  /api/v1/weather:
    get:
      summary: "Get current weather for a location"
      description: "Returns current weather data for a given location identified by city name or postcode."
      tags:
        - WeatherService
      operationId: 'getCurrentWeather'
      parameters:
        - $ref: "#/components/parameters/location"
      responses:
        200:
          description: Current weather data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeatherResponse'
        400:
          description: Bad request - invalid or missing location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        404:
          description: Location not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        502:
          description: Upstream weather API unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/forecast:
    get:
      summary: "Get multi-day forecast for a location"
      description: "Returns a multi-day weather forecast (up to 5 days) for a given location."
      tags:
        - ForecastService
      operationId: 'getForecast'
      parameters:
        - $ref: "#/components/parameters/location"
        - $ref: "#/components/parameters/days"
      responses:
        200:
          description: Forecast data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        400:
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        404:
          description: Location not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        502:
          description: Upstream weather API unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/locations/search:
    get:
      summary: "Search for locations by partial name"
      description: "Returns matching locations with enough detail to disambiguate (e.g. London, GB vs London, ON, CA)."
      tags:
        - LocationService
      operationId: 'searchLocations'
      parameters:
        - $ref: "#/components/parameters/query"
      responses:
        200:
          description: Matching locations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationSearchResponse'
        400:
          description: Bad request - query too short
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        502:
          description: Upstream weather API unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/favourites:
    get:
      summary: "List all saved favourite locations"
      description: "Returns a list of the consumer's saved favourite locations."
      tags:
        - FavouriteService
      operationId: 'listFavourites'
      responses:
        200:
          description: List of favourites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteListResponse'
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: "Save a location as a favourite"
      description: "Saves a new location to the consumer's list of favourites."
      tags:
        - FavouriteService
      operationId: 'createFavourite'
      requestBody:
        description: Favourite location details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavouriteRequest'
      responses:
        201:
          description: Favourite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
        400:
          description: Bad request - invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/favourites/{id}:
    delete:
      summary: "Remove a favourite location"
      description: "Removes a saved favourite location by its ID."
      tags:
        - FavouriteService
      operationId: 'deleteFavourite'
      parameters:
        - $ref: "#/components/parameters/favouriteId"
      responses:
        204:
          description: Favourite deleted successfully
        404:
          description: Favourite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        500:
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/health:
    get:
      summary: "Check service health"
      description: "Returns the health status of the service including upstream dependency state."
      tags:
        - HealthService
      operationId: 'getHealth'
      responses:
        200:
          description: Service health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  parameters:
    location:
      name: location
      in: query
      required: true
      schema:
        type: string
        minLength: 1
        description: "City name or postcode to look up weather for"
        example: "London"
    days:
      name: days
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
        description: "Number of forecast days (1-5)"
        example: 3
    query:
      name: query
      in: query
      required: true
      schema:
        type: string
        minLength: 2
        description: "Partial location name to search for (minimum 2 characters)"
        example: "Lond"
    favouriteId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        description: "ID of the favourite to remove"
        example: 1

  schemas:
    WeatherResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CurrentWeather'
        source:
          type: string
          description: "Data source identifier"
          example: "weatherapi.com"

    CurrentWeather:
      type: object
      required:
        - location
        - country
        - temperatureCelsius
        - condition
        - windSpeedKph
        - humidity
        - lastUpdated
      properties:
        location:
          type: string
          description: "Location name"
          example: "London"
        country:
          type: string
          description: "Country name"
          example: "United Kingdom"
        temperatureCelsius:
          type: number
          format: double
          description: "Temperature in Celsius"
          example: 15.0
        temperatureFahrenheit:
          type: number
          format: double
          description: "Temperature in Fahrenheit"
          example: 59.0
        condition:
          type: string
          description: "Weather condition text"
          example: "Partly cloudy"
        conditionIcon:
          type: string
          description: "URL to weather condition icon"
          example: "//cdn.weatherapi.com/weather/64x64/day/116.png"
        windSpeedKph:
          type: number
          format: double
          description: "Wind speed in km/h"
          example: 12.2
        humidity:
          type: integer
          description: "Humidity percentage"
          example: 72
        lastUpdated:
          type: string
          format: date-time
          description: "Timestamp of when data was last updated"
          example: "2026-07-18T10:30:00"

    ForecastResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ForecastData'
        source:
          type: string
          example: "weatherapi.com"

    ForecastData:
      type: object
      required:
        - location
        - country
        - days
      properties:
        location:
          type: string
          example: "London"
        country:
          type: string
          example: "United Kingdom"
        days:
          type: array
          items:
            $ref: '#/components/schemas/DailyForecast'

    DailyForecast:
      type: object
      required:
        - date
        - maxTempCelsius
        - minTempCelsius
        - condition
        - chanceOfRain
      properties:
        date:
          type: string
          format: date
          description: "Forecast date"
          example: "2026-07-18"
        maxTempCelsius:
          type: number
          format: double
          description: "Maximum temperature in Celsius"
          example: 18.0
        minTempCelsius:
          type: number
          format: double
          description: "Minimum temperature in Celsius"
          example: 10.0
        condition:
          type: string
          description: "Weather condition summary"
          example: "Sunny"
        conditionIcon:
          type: string
          description: "URL to weather condition icon"
          example: "//cdn.weatherapi.com/weather/64x64/day/113.png"
        chanceOfRain:
          type: integer
          description: "Precipitation probability percentage"
          example: 10
        maxWindSpeedKph:
          type: number
          format: double
          description: "Maximum wind speed in km/h"
          example: 20.5

    LocationSearchResponse:
      type: object
      properties:
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    Location:
      type: object
      required:
        - name
        - country
        - latitude
        - longitude
      properties:
        name:
          type: string
          description: "Location name"
          example: "London"
        region:
          type: string
          description: "Region or state"
          example: "City of London, Greater London"
        country:
          type: string
          description: "Country name"
          example: "United Kingdom"
        latitude:
          type: number
          format: double
          description: "Latitude"
          example: 51.52
        longitude:
          type: number
          format: double
          description: "Longitude"
          example: -0.11

    FavouriteListResponse:
      type: object
      properties:
        favourites:
          type: array
          items:
            $ref: '#/components/schemas/Favourite'

    Favourite:
      type: object
      required:
        - id
        - locationName
      properties:
        id:
          type: integer
          format: int64
          description: "Unique favourite ID"
          example: 1
        locationName:
          type: string
          description: "Name of the saved location"
          example: "London"
        country:
          type: string
          description: "Country of the location"
          example: "United Kingdom"
        latitude:
          type: number
          format: double
          description: "Latitude"
          example: 51.52
        longitude:
          type: number
          format: double
          description: "Longitude"
          example: -0.11
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when favourite was saved"
          example: "2026-07-18T14:30:00"

    FavouriteRequest:
      type: object
      required:
        - locationName
      properties:
        locationName:
          type: string
          minLength: 1
          description: "Name of the location to save"
          example: "London"
        country:
          type: string
          description: "Country of the location"
          example: "United Kingdom"
        latitude:
          type: number
          format: double
          description: "Latitude"
          example: 51.52
        longitude:
          type: number
          format: double
          description: "Longitude"
          example: -0.11

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          description: "Service status"
          enum:
            - UP
            - DEGRADED
            - DOWN
          example: "UP"
        timestamp:
          type: string
          format: date-time
          description: "Current server timestamp"
        upstreamApi:
          $ref: '#/components/schemas/UpstreamApiHealth'

    UpstreamApiHealth:
      type: object
      properties:
        circuitBreakerState:
          type: string
          description: "Current circuit breaker state"
          enum:
            - CLOSED
            - OPEN
            - HALF_OPEN
          example: "CLOSED"
        failureRate:
          type: number
          format: float
          description: "Current failure rate percentage"
          example: 0.0

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          description: "HTTP status code"
          example: 400
        message:
          type: string
          description: "Human-readable error message"
          example: "Location parameter is required"
        timestamp:
          type: string
          format: date-time
          description: "Error occurrence timestamp"
          example: "2026-07-18T14:30:00"
